app = "burnish-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  LLM_BACKEND = "none"
  TRUST_PROXY = "true"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
