name: Screenshot Check

# Runs independently of the main CI so it can re-fire on `edited` events
# (PR body updates) without forcing a full build/test re-run. Moving this
# to its own workflow is the safe way to include the `edited` trigger —
# gating jobs inside ci.yml with `if: action != 'edited'` would cause
# required checks like `build` to report as skipped-success on body edits,
# which would silently overwrite any prior failure.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

jobs:
  screenshot-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for visual file changes
        id: visual
        run: |
          VISUAL_FILES=$(git diff --name-only origin/main...HEAD -- \
            'apps/demo/public/**' \
            'packages/components/**' \
            'packages/renderer/**' \
            '**/output-transformer*' \
            '**/*.css' || true)
          if [ -n "$VISUAL_FILES" ]; then
            echo "has_visual_changes=true" >> "$GITHUB_OUTPUT"
            echo "Visual files changed:"
            echo "$VISUAL_FILES"
          else
            echo "has_visual_changes=false" >> "$GITHUB_OUTPUT"
            echo "No visual file changes detected."
          fi

      - name: Verify PR has screenshot
        if: steps.visual.outputs.has_visual_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q .body)
          if echo "$PR_BODY" | grep -qi '\[skip.screenshot\]'; then
            echo "Screenshot check skipped via [skip-screenshot] marker."
            exit 0
          fi
          if echo "$PR_BODY" | grep -q '!\[verify-'; then
            echo "Screenshot found in PR body."
          else
            echo "::error::This PR changes visual files but has no verification screenshot."
            echo "Add a screenshot with ![verify-<issue>](...) or add [skip-screenshot] if this is a non-visual change."
            exit 1
          fi
