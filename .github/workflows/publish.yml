name: Publish to npm

on:
  release:
    types: [published]
  pull_request:
    branches: [main]

jobs:
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r exec npm pack --dry-run

  publish:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish CLI package (unscoped)
        run: pnpm --filter burnish publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish scoped packages (@burnish/*)
        run: pnpm --filter '@burnish/*' publish --no-git-checks --access public || echo "Scoped packages skipped — @burnish org may not exist yet"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
