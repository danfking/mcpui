<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burnish — Universal MCP Dashboard</title>
    <link rel="stylesheet" href="/tokens.css">
    <link rel="stylesheet" href="/style.css">

    <!-- Import map for bare specifiers (lit, lit/decorators) -->
    <script type="importmap">
    {
        "imports": {
            "lit": "https://cdn.jsdelivr.net/npm/lit@3/+esm",
            "lit/": "https://cdn.jsdelivr.net/npm/lit@3/",
            "lit-html": "https://cdn.jsdelivr.net/npm/lit-html@3/+esm",
            "lit-html/": "https://cdn.jsdelivr.net/npm/lit-html@3/",
            "lit-element/": "https://cdn.jsdelivr.net/npm/lit-element@4/",
            "@lit/reactive-element": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@2/+esm",
            "@lit/reactive-element/": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@2/",
            "idb-keyval": "https://cdn.jsdelivr.net/npm/idb-keyval@6/+esm"
        }
    }
    </script>

    <!-- Chart.js for burnish-chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

    <!-- Burnish Components (CDN-style from local build) -->
    <script type="module" src="/components/card.js"></script>
    <script type="module" src="/components/stat-bar.js"></script>
    <script type="module" src="/components/table.js"></script>
    <script type="module" src="/components/chart.js"></script>
    <script type="module" src="/components/section.js"></script>
    <script type="module" src="/components/metric.js"></script>
    <script type="module" src="/components/message.js"></script>
    <script type="module" src="/components/form.js"></script>
    <script type="module" src="/components/actions.js"></script>

    <!-- App -->
    <script type="module" src="/app.js"></script>
</head>
<body>
    <!-- Session Panel (left) -->
    <aside id="session-panel" class="burnish-session-panel">
        <div class="burnish-session-panel-header">
            <span class="burnish-session-panel-title">Sessions</span>
            <button id="btn-new-session" class="burnish-session-new-btn" title="New conversation">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div id="session-list" class="burnish-session-list">
            <!-- Session items rendered by JS -->
        </div>
    </aside>

    <!-- Header -->
    <header class="burnish-header">
        <div class="burnish-header-left">
            <button id="btn-toggle-sessions" class="burnish-header-btn burnish-mobile-only" title="Sessions">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                    <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
                </svg>
            </button>
            <span class="burnish-logo">Burnish</span>
            <span class="burnish-breadcrumb" id="breadcrumb">Dashboard</span>
        </div>
        <div class="burnish-header-right">
            <div id="fast-toggle" class="burnish-fast-toggle" title="Use faster model (Haiku)">
                <span>Fast</span>
                <div class="burnish-fast-toggle-switch"></div>
            </div>
            <button id="btn-servers" class="burnish-header-btn" title="Connected servers">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                    <path d="M2 4c0-1 3.6-2 8-2s8 1 8 2v2c0 1-3.6 2-8 2S2 7 2 6V4zm0 5c1.6 1 4.6 1.5 8 1.5S16.4 10 18 9v3c0 1-3.6 2-8 2S2 13 2 12V9zm0 5c1.6 1 4.6 1.5 8 1.5S16.4 15 18 14v2c0 1-3.6 2-8 2S2 17 2 16v-2z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main layout -->
    <div class="burnish-layout">
        <main id="content-area" class="burnish-content">
            <div id="dashboard-container" class="burnish-dashboard">
                <div class="burnish-empty-state">
                    <div class="burnish-empty-icon">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="20" stroke="#d1d5db" stroke-width="2" fill="none"/>
                            <path d="M16 24h16M24 16v16" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2>Welcome to Burnish</h2>
                    <p>Connect to any MCP server and explore your data visually.</p>
                    <div class="burnish-suggestions">
                        <button class="burnish-suggestion" data-prompt="What tools are available?">Available tools</button>
                        <button class="burnish-suggestion" data-prompt="Show me an overview of the data">Data overview</button>
                        <button class="burnish-suggestion" data-prompt="List everything you can access">List resources</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Prompt bar -->
    <footer class="burnish-prompt-bar">
        <div class="burnish-prompt-container">
            <textarea
                id="prompt-input"
                class="burnish-prompt-input"
                placeholder="Ask about your data..."
                rows="1"
                autocomplete="off"
            ></textarea>
            <button id="btn-submit" class="burnish-prompt-submit" title="Send">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M2 10l7-7v4h9v6H9v4z" transform="rotate(-90 10 10)"/>
                </svg>
            </button>
        </div>
    </footer>

    <!-- Server Config Modal -->
    <div id="server-modal" class="burnish-modal" hidden>
        <div class="burnish-modal-backdrop"></div>
        <div class="burnish-modal-content">
            <div class="burnish-modal-header">
                <h3>MCP Servers</h3>
                <button class="burnish-modal-close" id="btn-close-modal">&times;</button>
            </div>
            <div class="burnish-modal-body">
                <div class="burnish-connected-servers">
                    <h4>Connected</h4>
                    <div id="connected-server-list"></div>
                </div>
                <div class="burnish-server-catalog">
                    <h4>Add Server</h4>
                    <div id="catalog-grid"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
