<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCPUI — Universal MCP Dashboard</title>
    <link rel="stylesheet" href="/tokens.css">
    <link rel="stylesheet" href="/style.css">

    <!-- Import map for bare specifiers (lit, lit/decorators) -->
    <script type="importmap">
    {
        "imports": {
            "lit": "https://cdn.jsdelivr.net/npm/lit@3/+esm",
            "lit/": "https://cdn.jsdelivr.net/npm/lit@3/",
            "lit-html": "https://cdn.jsdelivr.net/npm/lit-html@3/+esm",
            "lit-html/": "https://cdn.jsdelivr.net/npm/lit-html@3/",
            "lit-element/": "https://cdn.jsdelivr.net/npm/lit-element@4/",
            "@lit/reactive-element": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@2/+esm",
            "@lit/reactive-element/": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@2/"
        }
    }
    </script>

    <!-- Chart.js for mcpui-chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

    <!-- MCPUI Components (CDN-style from local build) -->
    <script type="module" src="/components/card.js"></script>
    <script type="module" src="/components/stat-bar.js"></script>
    <script type="module" src="/components/table.js"></script>
    <script type="module" src="/components/chart.js"></script>
    <script type="module" src="/components/section.js"></script>
    <script type="module" src="/components/metric.js"></script>
    <script type="module" src="/components/message.js"></script>

    <!-- App -->
    <script type="module" src="/app.js"></script>
</head>
<body>
    <!-- Header -->
    <header class="mcpui-header">
        <div class="mcpui-header-left">
            <span class="mcpui-logo">MCPUI</span>
            <span class="mcpui-breadcrumb" id="breadcrumb">Dashboard</span>
        </div>
        <div class="mcpui-header-right">
            <button id="btn-servers" class="mcpui-header-btn" title="Connected servers">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                    <path d="M2 4c0-1 3.6-2 8-2s8 1 8 2v2c0 1-3.6 2-8 2S2 7 2 6V4zm0 5c1.6 1 4.6 1.5 8 1.5S16.4 10 18 9v3c0 1-3.6 2-8 2S2 13 2 12V9zm0 5c1.6 1 4.6 1.5 8 1.5S16.4 15 18 14v2c0 1-3.6 2-8 2S2 17 2 16v-2z"/>
                </svg>
            </button>
            <button id="btn-toggle-sidebar" class="mcpui-header-btn" title="Toggle chat">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                    <path d="M2 3h14v10H5l-3 3V3z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main layout -->
    <div class="mcpui-layout">
        <!-- Content area -->
        <main id="content-area" class="mcpui-content">
            <div id="dashboard-container" class="mcpui-dashboard">
                <div class="mcpui-empty-state">
                    <div class="mcpui-empty-icon">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="20" stroke="#d1d5db" stroke-width="2" fill="none"/>
                            <path d="M16 24h16M24 16v16" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2>Welcome to MCPUI</h2>
                    <p>Connect to any MCP server and explore your data visually.</p>
                    <div class="mcpui-suggestions">
                        <button class="mcpui-suggestion" data-prompt="What tools are available?">Available tools</button>
                        <button class="mcpui-suggestion" data-prompt="Show me an overview of the data">Data overview</button>
                        <button class="mcpui-suggestion" data-prompt="List everything you can access">List resources</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Chat sidebar -->
        <aside id="sidebar" class="mcpui-sidebar">
            <div class="mcpui-sidebar-header">
                <h3>Conversation</h3>
                <button id="btn-new-chat" class="mcpui-sidebar-btn" title="New conversation">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div id="chat-messages" class="mcpui-chat-messages"></div>
        </aside>
    </div>

    <!-- Prompt bar -->
    <footer class="mcpui-prompt-bar">
        <div class="mcpui-prompt-container">
            <textarea
                id="prompt-input"
                class="mcpui-prompt-input"
                placeholder="Ask about your data..."
                rows="1"
                autocomplete="off"
            ></textarea>
            <button id="btn-submit" class="mcpui-prompt-submit" title="Send">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M2 10l7-7v4h9v6H9v4z" transform="rotate(-90 10 10)"/>
                </svg>
            </button>
        </div>
    </footer>
</body>
</html>
