<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burnish — Universal MCP Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta property="og:image" content="/android-chrome-512x512.png">
    <meta name="twitter:image" content="/android-chrome-512x512.png">
    <link rel="stylesheet" href="/tokens.css">
    <link rel="stylesheet" href="/style.css">

    <!-- Import map for bare specifiers (lit, lit/decorators) -->
    <script type="importmap">
    {
        "imports": {
            "lit": "https://cdn.jsdelivr.net/npm/lit@3/+esm",
            "lit/": "https://cdn.jsdelivr.net/npm/lit@3/",
            "lit-html": "https://cdn.jsdelivr.net/npm/lit-html@3/+esm",
            "lit-html/": "https://cdn.jsdelivr.net/npm/lit-html@3/",
            "lit-element/": "https://cdn.jsdelivr.net/npm/lit-element@4/",
            "@lit/reactive-element": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@2/+esm",
            "@lit/reactive-element/": "https://cdn.jsdelivr.net/npm/@lit/reactive-element@2/",
            "idb-keyval": "https://cdn.jsdelivr.net/npm/idb-keyval@6/+esm",
            "@burnishdev/app": "/app/index.js",
            "@burnishdev/app/": "/app/",
            "@burnishdev/renderer": "/renderer/index.js",
            "@burnishdev/renderer/": "/renderer/"
        }
    }
    </script>

    <!-- Chart.js for burnish-chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"
            integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
            crossorigin="anonymous"></script>

    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"
            integrity="sha384-pcBjnGbkyKeOXaoFkmJiuR9E08/6gkmus6/Strimnxtl3uk0Hx23v345pWyC/MMr"
            crossorigin="anonymous"></script>

    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"
            integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi"
            crossorigin="anonymous"></script>

    <!-- Burnish Components (CDN-style from local build) -->
    <script type="module" src="/components/card.js"></script>
    <script type="module" src="/components/stat-bar.js"></script>
    <script type="module" src="/components/table.js"></script>
    <script type="module" src="/components/chart.js"></script>
    <script type="module" src="/components/section.js"></script>
    <script type="module" src="/components/metric.js"></script>
    <script type="module" src="/components/message.js"></script>
    <script type="module" src="/components/form.js"></script>
    <script type="module" src="/components/actions.js"></script>
    <script type="module" src="/components/pipeline.js"></script>

    <!-- Theme initialization (prevent flash of wrong theme) -->
    <script>
    (function initTheme() {
        const stored = localStorage.getItem('burnish:theme');
        if (stored) {
            document.documentElement.setAttribute('data-theme', stored);
        }
    })();
    </script>

    <!-- App -->
    <script type="module" src="/app.js"></script>
</head>
<body>
    <!-- Sidebar backdrop (mobile) -->
    <div id="sidebar-backdrop" class="burnish-sidebar-backdrop"></div>

    <!-- Session Panel (left) -->
    <aside id="session-panel" class="burnish-session-panel">
        <div class="burnish-session-panel-header">
            <span class="burnish-session-panel-title">Sessions</span>
            <button id="btn-new-session" class="burnish-session-new-btn" title="New session">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="burnish-session-search-wrap">
            <input id="session-search" class="burnish-session-search" type="text" placeholder="Search sessions..." />
        </div>
        <div id="session-list" class="burnish-session-list">
            <!-- Session items rendered by JS -->
        </div>
    </aside>

    <!-- Header -->
    <header class="burnish-header">
        <div class="burnish-header-left">
            <button id="btn-toggle-sessions" class="burnish-header-btn burnish-mobile-only" title="Sessions">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
                    <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
                </svg>
            </button>
            <img src="/logo.png" alt="" class="burnish-logo-icon" width="28" height="28">
            <span class="burnish-logo">Burnish</span>
            <span class="burnish-breadcrumb" id="breadcrumb">Dashboard</span>
        </div>
        <div class="burnish-header-right">
            <button id="theme-toggle" class="burnish-theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
                <svg class="burnish-theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg class="burnish-theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button id="btn-perf-toggle" class="burnish-header-btn" title="Model Performance">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1" y="10" width="3" height="7" rx="0.5"/>
                    <rect x="5.5" y="6" width="3" height="11" rx="0.5"/>
                    <rect x="10" y="3" width="3" height="14" rx="0.5"/>
                    <rect x="14.5" y="1" width="3" height="16" rx="0.5"/>
                </svg>
            </button>
            <div id="mode-toggle"></div>
            <button id="btn-dashboard-toggle" class="burnish-header-btn" title="Dashboard mode">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="1" y="1" width="7" height="7" rx="1"/>
                    <rect x="10" y="1" width="7" height="7" rx="1"/>
                    <rect x="1" y="10" width="7" height="7" rx="1"/>
                    <rect x="10" y="10" width="7" height="7" rx="1"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main layout -->
    <div class="burnish-layout">
        <main id="content-area" class="burnish-content">
            <div id="dashboard-container" class="burnish-dashboard">
                <div class="burnish-empty-state">
                    <div class="burnish-empty-icon">
                        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="20" stroke="#d1d5db" stroke-width="2" fill="none"/>
                            <path d="M16 24h16M24 16v16" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2>Welcome to Burnish</h2>
                    <p>Explore your data visually through connected services.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- LLM Insight prompt bar (hidden unless LLM Insight mode active) -->
    <div id="llm-insight-prompt-bar">
        <textarea rows="1" placeholder="Ask a question in natural language..." id="llm-insight-input"></textarea>
    </div>

</body>
</html>
